<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spring AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
  <!-- 마크다운을 HTML로 변환하는 라이브러리-->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>  
  <link href="/css/springai.css" rel="stylesheet" />
  <script src="/js/springai.js"></script>
  <script>
    // ##### 제출 버튼을 클릭했을 때 실행하는 함수 #####
    async function handleSubmit() {
      try {
        // 텍스트 질문을 얻고 대화 패널에 추가하기
        const question = document.getElementById("question").value;
        if (question === "") return;
        document.getElementById("question").value = "";
        springai.addUserQuestion(question, "chatPanel");

        // 응답이 오기까지 스피너 보여주기
        springai.setSpinner("spinner", true);

				// AJAX 요청하고 응답받기
				const response = await fetch('/ai/multi-messages', {
				  method: "post",
					headers: {
					  'Content-Type': 'application/x-www-form-urlencoded',
					  'Accept': 'text/plain'
					},
				  body: new URLSearchParams({ question })
				});

        // AI 모델 답변이 들어갈 위치를 대화 패널에 추가
        const uuid = springai.addAnswerPlaceHolder("chatPanel");

        // 텍스트 답변 출력하기
        const text = await response.text();
        document.getElementById(uuid).innerHTML = text;
        springai.scrollToHeight("chatPanel");
      } catch (error) {
        console.log(error);
      } finally {
        //스피너 숨기기
        springai.setSpinner("spinner", false);
      }
    } 
  </script>
</head>

<body>
  <div class="d-flex flex-column vh-100">
    <div id="headPanel" class="navbar justify-content-between">
      <a href="/" class="navbar-brand ps-2">
        <img src="/image/spring_ai_logo_with_text.svg" width="200" />
      </a>
      <div id="spinner" class="spinner-border text-success d-none me-3" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <div id="chatPanel" class="flex-grow-1 container-fluid h-100 my-2" style="overflow-y:auto; overflow-x:hidden;">
      <div class="d-flex justify-content-start align-items-end gap-2 m-2">
        <img src="/image/assistant.png" class="chat-avatar" width="36" />
        <div class="chat-bubble ai-bubble">질문을 올려주세요.</div>
      </div>
    </div>

    <div id="inputPanel" class="bg-secondary-subtle">
      <div class="input-group p-2">
        <span class="input-group-text">언어</span>
        <select id="language" class="form-select" style="max-width:120px">
          <option value="영어">영어</option>
          <option value="일본어">일본어</option>
          <option value="한국어">한국어</option>
        </select>
        <span class="input-group-text">문장</span>
        <label for="question"></label><input id="question" type="text" class="form-control" value="" onkeyup="if(event.key === 'Enter') handleSubmit()">
        <span class="input-group-text">
          <button type="button" class="btn btn-primary" onclick="handleSubmit()">제출</button>
        </span>
      </div>
    </div>
  </div>
</body>

</html>
